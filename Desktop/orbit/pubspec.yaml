name: orbit
description: "ORBIT - 캠퍼스 마이크로 협력 네트워크"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase Core
  firebase_core: ^3.6.0

  # Firebase Authentication
  firebase_auth: ^5.3.1

  # Cloud Firestore
  cloud_firestore: ^5.4.4

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Google Maps
  google_maps_flutter: ^2.9.0

  # HTTP Client
  http: ^1.2.1

  # Location
  geolocator: ^13.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # [추가] 이미지 에셋 경로 등록
  assets:
    - assets/images/

  # [수정] PretendardBlack 폰트만 등록 (ORBIT 텍스트 전용)
  fonts:
    - family: PretendardBlack
      fonts:
        - asset: assets/fonts/Pretendard-Black.ttf
